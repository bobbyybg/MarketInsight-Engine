name: Terminal SDK Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install Package and Test Tools
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Lint with Ruff
      run: ruff check src/ tests/

    - name: Formatter Verification
      run: ruff format --check src/ tests/

    - name: Static Type Inspection with Mypy
      run: mypy src/

    - name: Execute Pytest Suite
      run: pytest --cov=wall_street_terminal tests/